<!DOCTYPE html>

<body>

                    <li><a href="#"><span>Culture</span><span>Culture</span></a></li>
                    <li><a href="#"><span>Job</span><span>Job</span></a></li>
                    <li><a href="#"><span>People</span><span>People</span></a></li>
                </ul>

                <div class="curtain"></div>

        </nav>
    </header>

    <body>
        <div class="top_box">
            <p class="top_text"><span>Welcome and Enjoy</span><br>in Our Company<br>For Working</p>

            <div class="slider">
                <div class="sliders">
                    <img src="img/img1.jpg" class="slide">
                    <img src="img/img2.jpg" class="slide">
                    <img src="img/img3.jpg" class="slide">
                    <img src="img/img4.jpg" class="slide">
                    <img src="img/img5.jpg" class="slide">
                    <img src="img/img1.jpg" class="slide">

                    <img src="img/img3.jpg" class="slide">
                    <img src="img/img4.jpg" class="slide">
                    <img src="img/img5.jpg" class="slide">
                </div>
            </div>

            <div class="top_coupon">
                <div class="top_coupon_left">
                    <p>オープンスタッフ<br>募集中</p>
                </div>
                <div class="top_coupon_right">

                </div>
            </div>

            <svg class="circle" viewBox="0 0 50 50">
                <defs>
                    <path id="circlePath" class="circle_circle"
                        d="M 25, 25 m -20, 0 a 20, 20 0 1, 1 40, 0 a 20, 20 0 1, 1 -40, 0"></path>
                </defs>
                <text class="circle_text">
                    <textPath href="#circlePath" staffOffset="10%">
                        Scroll Scroll Scroll
                    </textPath>
                </text>
            </svg>

            <div class="scroll_bar">
                <span></span>
            </div>

                    <p>About us</p>
                    <h2>私たちについて</h2>
                </div>
                <div class="about_us_main">
                    <div class="about_us_letter">
                        <p>
                            私たちはweb制作をはじめとする、顧客の売り上げを満足させるために<br>
                            様々な施策を提供するサービスを2026年から営んでいます。<br>
                            全ての業務をプロフェッショナルである個人事業者の方々に<br>
                            任せることにより業務の効率化と品質の向上に努めているのです。
                        </p>
                    </div>
                    <div class="about_us_achieve">
                        
                    </div>
